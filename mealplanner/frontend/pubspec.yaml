name: smart_meal_planner
description: "A smart meal planner mobile application integrated with Polish grocery stores."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & DI
  provider: ^6.1.1

  # Networking & HTTP
  http: ^1.2.1

  # Local Storage
  shared_preferences: ^2.2.3

  # UI & Styling
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  percent_indicator: ^4.2.3
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
